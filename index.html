<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina VIP Hack</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }
        
        /* Floating Trigger Button (এক কোণায় থাকবে) */
        #triggerBtn { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #f1c40f; border-radius: 50%; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #000; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 15px rgba(241,196,15,0.6); text-align: center; }

        /* Lock Overlay */
        #lockOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .v-box { background: #0d1117; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; border: 1px solid #30363d; position: relative; }
        
        .btn-deposit { background: #f1c40f; color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-activate { background: #238636; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; font-size: 15px; }
        
        /* Prediction Panel */
        #predictionPanel { position: fixed; top: 20px; right: 20px; width: 140px; background: #0d1117; border: 2px solid #555; border-radius: 15px; padding: 10px; z-index: 9998; color: white; text-align: center; display: none; }
        .close-btn { color: #8b949e; font-size: 12px; cursor: pointer; margin-top: 15px; display: block; text-decoration: underline; }
    </style>
</head>
<body>

    <iframe id="gameFrame" src="https://www.51gameq.com/#/register?invitationCode=82751100725"></iframe>

    <div id="triggerBtn" onclick="toggleLock()">ACTIVATE<br>HACK</div>

    <div id="lockOverlay">
        <div class="v-box">
            <h3 style="color: #f1c40f; margin: 0 0 10px 0;">HACK LOCKED</h3>
            <p style="color: #8b949e; font-size: 12px;">To unlock, deposit <b>300 INR</b> and get key.</p>
            
            <button class="btn-deposit" onclick="goDeposit()">1. GO TO DEPOSIT PAGE</button>
            <input type="text" id="authKey" placeholder="ENTER SECRET KEY">
            <button class="btn-activate" onclick="checkAuth()">2. VERIFY & ACTIVATE</button>
            
            <a href="https://t.me/Marina_assistant_jaiclub" target="_blank" style="color: #58a6ff; font-size: 13px; display: block; margin-top: 15px; text-decoration: none; font-weight: bold;">📩 Contact Admin for Key</a>
            
            <span class="close-btn" onclick="toggleLock()">Close Menu</span>
        </div>
    </div>

    <div id="predictionPanel">
        <div style="font-size: 10px; color: #aaa;">MARINA SERVER</div>
        <div id="timer" style="color: #ff7b72; font-size: 12px; font-weight: bold;">00:60</div>
        <hr style="border: 0.5px solid #333; margin: 8px 0;">
        <div id="resText" style="font-size: 38px; font-weight: 900;">-</div>
    </div>

    <script>
        function toggleLock() {
            let overlay = document.getElementById('lockOverlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function goDeposit() {
            // Recharge page-এ নিয়ে যাবে
            document.getElementById('gameFrame').src = "https://www.51gameq.com/#/main/recharge";
            toggleLock();
        }

        function checkAuth() {
            const userInput = document.getElementById('authKey').value;
            // Key is: 3i00km
            if(userInput === "3i00km") {
                document.getElementById('lockOverlay').style.display = 'none';
                document.getElementById('triggerBtn').style.display = 'none';
                document.getElementById('predictionPanel').style.display = 'block';
                startHack();
            } else { 
                alert("Invalid Key! Please check with Admin."); 
            }
        }

        function startHack() {
            setInterval(() => {
                let sec = 60 - new Date().getSeconds();
                document.getElementById('timer').innerText = `NEXT: ${sec}s`;
                if(sec === 60 || sec === 1) {
                    const res = ["BIG", "SMALL"][Math.floor(Math.random() * 2)];
                    const div = document.getElementById('resText');
                    div.innerText = res;
                    div.style.color = (res === "BIG") ? "#f85149" : "#238636";
                }
            }, 1000);
        }
    </script>
</body>
</html>
