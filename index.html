<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina VIP Hack</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; z-index: 1; }
        
        /* ছোট গোল বাটন যা কোণায় থাকবে */
        #trigger { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 60px; 
            height: 60px; 
            background: #f1c40f; 
            border-radius: 50%; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: bold; 
            color: #000; 
            cursor: pointer; 
            border: 2px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            line-height: 1.2;
        }

        /* লক স্ক্রিন যা প্রথমে লুকানো থাকবে */
        #lockOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.96); z-index: 10000; 
            display: none; align-items: center; justify-content: center; 
        }
        .v-box { background: #0d1117; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; border: 1px solid #30363d; color: white; }
        .btn-deposit { background: #f1c40f; color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-activate { background: #238636; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        
        /* প্রেডিকশন প্যানেল */
        #predictionPanel { position: fixed; top: 20px; right: 20px; width: 140px; background: #0d1117; border: 2px solid #58a6ff; border-radius: 15px; padding: 10px; z-index: 9998; color: white; text-align: center; display: none; }
    </style>
</head>
<body>

    <iframe id="gameFrame" src="https://www.51gameq.com/#/register?invitationCode=82751100725"></iframe>

    <div id="trigger" onclick="showLock()">HACK<br>MENU</div>

    <div id="lockOverlay">
        <div class="v-box">
            <h3 style="color: #f1c40f; margin-top:0;">HACK LOCKED</h3>
            <p style="font-size: 12px; color: #8b949e;">First, complete 300 INR Deposit.</p>
            <button class="btn-deposit" onclick="goDeposit()">1. GO TO DEPOSIT</button>
            <input type="text" id="authKey" placeholder="Enter Secret Key">
            <button class="btn-activate" onclick="checkAuth()">2. VERIFY & ACTIVATE</button>
            <p onclick="closeLock()" style="font-size: 11px; color: #666; margin-top: 15px; cursor: pointer;">[ Close ]</p>
        </div>
    </div>

    <div id="predictionPanel">
        <div style="font-size: 10px; color: #aaa;">MARINA SERVER</div>
        <div id="timer" style="color: #ff7b72; font-size: 14px;">60s</div>
        <hr style="border: 0.5px solid #333;">
        <div id="resText" style="font-size: 35px; font-weight: 900;">-</div>
    </div>

    <script>
        function showLock() { document.getElementById('lockOverlay').style.display = 'flex'; }
        function closeLock() { document.getElementById('lockOverlay').style.display = 'none'; }
        function goDeposit() { 
            document.getElementById('gameFrame').src = "https://www.51gameq.com/#/main/recharge"; 
            closeLock(); 
        }
        function checkAuth() {
            if(document.getElementById('authKey').value === "3i00km") {
                document.getElementById('lockOverlay').style.display = 'none';
                document.getElementById('trigger').style.display = 'none';
                document.getElementById('predictionPanel').style.display = 'block';
                startHack();
            } else { alert("Wrong Key! Deposit first."); }
        }
        function startHack() {
            setInterval(() => {
                let sec = 60 - new Date().getSeconds();
                document.getElementById('timer').innerText = `NEXT: ${sec}s`;
                if(sec === 60 || sec === 0) {
                    const res = ["BIG", "SMALL"][Math.floor(Math.random() * 2)];
                    const div = document.getElementById('resText');
                    div.innerText = res;
                    div.style.color = (res === "BIG") ? "#f85149" : "#238636";
                }
            }, 1000);
        }
    </script>
</body>
</html>
